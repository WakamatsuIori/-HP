# 問い合わせフォーム等の「実行時シークレット」を GitHub Secrets → Cloudflare Pages へ同期する。
# 手動起動（workflow_dispatch）。値は GitHub Secrets に置き、ここでは変数名だけを扱う（コードに秘密を書かない・CLAUDE.md §3）。
# 使い方: GitHub Secrets に CONTACT_WEBHOOK_URL 等を登録 → このワークフローを実行 → Pages の実行時 env に反映。
name: sync-pages-secrets

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PAGES_PROJECT_NAME: wakamatsu-iori-hp

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Cloudflare Pages の実行時シークレットへ同期（値がある物だけ）
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTACT_WEBHOOK_URL: ${{ secrets.CONTACT_WEBHOOK_URL }}
          CONTACT_SHEET_ID: ${{ secrets.CONTACT_SHEET_ID }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          set -e
          put() {
            name="$1"; val="$2"
            if [ -n "$val" ]; then
              printf '%s' "$val" | npx wrangler@3 pages secret put "$name" --project-name="$PAGES_PROJECT_NAME"
              echo "→ $name を Pages 実行時シークレットに設定しました"
            else
              echo "→ $name は GitHub Secrets 未設定＝スキップ"
            fi
          }
          put CONTACT_WEBHOOK_URL "$CONTACT_WEBHOOK_URL"
          put CONTACT_SHEET_ID "$CONTACT_SHEET_ID"
          put TURNSTILE_SECRET_KEY "$TURNSTILE_SECRET_KEY"
